name: EAS BUILD
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npm install -g eas-cli

      - run: eas build --platform android --profile production --non-interactive

        env:
          token: ${{ secrets.EXPO_TOKEN }}